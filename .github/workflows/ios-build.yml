# ============================================================
# iOS Build & App Store Upload — Spliiit
# ============================================================
# Builds the Capacitor iOS app and uploads to TestFlight.
# Uses Xcode automatic signing — no Match or Cloud Mac needed.
#
# REQUIRED GITHUB SECRETS:
#   ASC_KEY_ID          — App Store Connect API Key ID
#   ASC_ISSUER_ID       — App Store Connect Issuer ID
#   ASC_KEY_CONTENT     — Base64-encoded .p8 API key file
#   APPLE_TEAM_ID       — Apple Developer Team ID (e.g. 7JUGQ64AX4)
#
# MANUAL TRIGGER:
#   Actions tab > "iOS Build & TestFlight" > "Run workflow"
# ============================================================

name: iOS Build & TestFlight

on:
  workflow_dispatch:
    inputs:
      submit_to_review:
        description: "Submit to App Store review after TestFlight upload?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build iOS & Upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor (pinned to v7)
        run: |
          npm install @capacitor/core@7 @capacitor/ios@7 @capacitor/cli@7

      - name: Add iOS platform (allow pod install to fail — we fix it next)
        run: |
          rm -rf ios
          # cap add ios creates the template + Podfile even if pod install fails
          # because the default Podfile targets iOS 13 but Capacitor pods need 16+
          npx cap add ios || true

      - name: Fix deployment target and install pods
        run: |
          cd ios/App

          # Fix Podfile: bump platform to 16.0
          sed -i '' "s/platform :ios, '.*'/platform :ios, '16.0'/" Podfile

          # Fix Xcode project: bump all deployment target entries
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g" App.xcodeproj/project.pbxproj

          # Disable code signing for pod targets so they don't conflict with App Distribution signing
          # Use a Ruby script to safely inject into the existing post_install hook
          ruby ../../scripts/patch_podfile_signing.rb Podfile
          echo "Podfile tail:"
          tail -20 Podfile

          # Now pod install will succeed
          pod install

          cd ../..

          # Copy web assets into the iOS project
          npx cap copy ios

      - name: Copy app icons and Info.plist
        run: |
          cp -r ios-assets/Assets.xcassets/AppIcon.appiconset/* \
            ios/App/App/Assets.xcassets/AppIcon.appiconset/
          cp ios-assets/Info.plist ios/App/App/Info.plist

      - name: Set up App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          # xcodebuild looks for keys in TWO locations:
          #   ~/private_keys/AuthKey_<ID>.p8
          #   ~/.appstoreconnect/private_keys/AuthKey_<ID>.p8
          mkdir -p ~/private_keys ~/.appstoreconnect/private_keys
          P8_PATH=~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          P8_PATH2=~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8

          # Detect format and write the key
          RAW_LEN=${#ASC_KEY_CONTENT}
          echo "secret raw length: $RAW_LEN"
          # b64-decode: strip whitespace first, then decode
          echo "$ASC_KEY_CONTENT" | tr -d '\r\n ' | base64 --decode > "$P8_PATH" 2>/dev/null || true
          DECODED_SIZE=$(wc -c < "$P8_PATH")
          DECODED_FIRST=$(head -c 5 "$P8_PATH" 2>/dev/null || echo "")
          echo "decoded size: $DECODED_SIZE first5: $DECODED_FIRST"

          if [ "$DECODED_FIRST" != "-----" ] || [ "$DECODED_SIZE" -lt 100 ]; then
            echo "WARNING: base64 decode produced invalid/small PEM (${DECODED_SIZE} bytes)."
            echo "The ASC_KEY_CONTENT secret appears to be incomplete."
            echo "Expected: a base64-encoded .p8 file (~230+ bytes decoded)."
            echo "Got: ${DECODED_SIZE} bytes. Attempting to write raw secret as PEM..."
            # Write raw secret directly — maybe it's already a PEM (not base64)
            printf '%s\n' "$ASC_KEY_CONTENT" > "$P8_PATH"
          fi

          # Copy to second location
          cp "$P8_PATH" "$P8_PATH2"
          chmod 600 "$P8_PATH" "$P8_PATH2"
          echo "final p8 size: $(wc -c < $P8_PATH) bytes"
          echo "final p8 lines: $(wc -l < $P8_PATH)"
          echo "final p8 first line: $(head -1 $P8_PATH)"

      - name: Set Xcode signing for distribution
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          # Use Automatic signing — for an archive build, Xcode automatically selects
          # the App Store distribution certificate and profile via -allowProvisioningUpdates.
          # Do NOT override CODE_SIGN_IDENTITY on the command line (causes conflict).
          # Just ensure DEVELOPMENT_TEAM is set so Xcode knows which team to use.
          sed -i '' \
            "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = ${APPLE_TEAM_ID};/g" \
            App.xcodeproj/project.pbxproj 2>/dev/null || true
          # Clear any stale provisioning profile specifier
          sed -i '' \
            "s/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = \"\";/g" \
            App.xcodeproj/project.pbxproj 2>/dev/null || true
          echo "Signing settings:"
          grep -E "CODE_SIGN_STYLE|DEVELOPMENT_TEAM|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE" App.xcodeproj/project.pbxproj | head -20

      - name: Build archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          set -o pipefail
          # Use Automatic signing — do NOT pass CODE_SIGN_IDENTITY override.
          # xcodebuild archive with Automatic signing + -allowProvisioningUpdates
          # will select Apple Distribution automatically for an archive build.
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath $HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            MARKETING_VERSION=1.0.0 \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID 2>&1 | tee /tmp/xcodebuild-archive.log | tail -80
          echo "--- Archive exit code: $? ---"
          ls -la $RUNNER_TEMP/App.xcarchive/ 2>/dev/null || echo "Archive not created!"

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Export locally (not upload) so we get a local .ipa file
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          PLIST

          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath $HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID 2>&1 | tail -50
          echo "Export contents:"
          find $RUNNER_TEMP/export -type f 2>/dev/null || echo "Export dir empty!"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Find the IPA — filename may differ from scheme name
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          echo "IPA path: $IPA_PATH"
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No .ipa file found in export directory"
            ls -la $RUNNER_TEMP/export/ || true
            exit 1
          fi
          xcrun altool --upload-package \
            "$IPA_PATH" \
            --type ios \
            --bundle-id ca.klarityit.spliiit \
            --bundle-version $(date +%Y%m%d%H%M) \
            --bundle-short-version-string 1.0.0 \
            --apiKey $ASC_KEY_ID \
            --apiIssuer $ASC_ISSUER_ID
