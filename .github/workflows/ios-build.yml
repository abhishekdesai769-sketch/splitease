# ============================================================
# iOS Build & App Store Upload — Spliiit
# ============================================================
# Builds the Capacitor iOS app and uploads to TestFlight.
# Uses Fastlane cert + sigh to create/import the Distribution
# certificate via ASC API — no Match, no P12 secret needed.
#
# REQUIRED GITHUB SECRETS:
#   ASC_KEY_ID          — App Store Connect API Key ID
#   ASC_ISSUER_ID       — App Store Connect Issuer ID
#   ASC_KEY_CONTENT     — Base64-encoded .p8 API key file
#   APPLE_TEAM_ID       — Apple Developer Team ID (e.g. 7JUGQ64AX4)
#
# MANUAL TRIGGER:
#   Actions tab > "iOS Build & TestFlight" > "Run workflow"
# ============================================================

name: iOS Build & TestFlight

on:
  workflow_dispatch:
    inputs:
      submit_to_review:
        description: "Submit to App Store review after TestFlight upload?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build iOS & Upload to TestFlight
    # macos-latest gives us the newest GitHub-provided runner image with
    # the latest Xcode. Required because Apple mandates Xcode 26+ / iOS
    # 26 SDK for all App Store uploads — older runners ship Xcode 16.x
    # and get rejected at upload time with STATE_ERROR.VALIDATION_ERROR.
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Apple requires Xcode 26+ for App Store submission as of 2026.
      # GitHub runners often have several Xcode versions installed; pick
      # the highest one so we don't accidentally get an older default.
      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "ERROR: No Xcode installation found on runner!"
            ls -d /Applications/Xcode* 2>/dev/null || echo "(no Xcode in /Applications)"
            exit 1
          fi
          echo "Selecting Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          echo "Active Xcode after selection:"
          xcode-select -p
          xcodebuild -version

      - name: Install Node dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor (pinned to v7)
        run: |
          npm install @capacitor/core@7 @capacitor/ios@7 @capacitor/cli@7 "@capacitor-community/apple-sign-in@^7.0.0"

      - name: Add iOS platform (allow pod install to fail — we fix it next)
        run: |
          rm -rf ios
          npx cap add ios || true

      - name: Fix deployment target and install pods
        run: |
          cd ios/App
          sed -i '' "s/platform :ios, '.*'/platform :ios, '16.0'/" Podfile
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g" App.xcodeproj/project.pbxproj
          ruby ../../scripts/patch_podfile_signing.rb Podfile

          echo "Podfile tail:"
          tail -20 Podfile
          pod install
          cd ../..
          npx cap copy ios

      - name: Copy app icons, Info.plist and entitlements
        run: |
          cp -r ios-assets/Assets.xcassets/AppIcon.appiconset/* \
            ios/App/App/Assets.xcassets/AppIcon.appiconset/
          cp ios-assets/Info.plist ios/App/App/Info.plist
          # Sign in with Apple entitlement (App.entitlements is already referenced by the Xcode project)
          cp ios-assets/App.entitlements ios/App/App/App.entitlements

      - name: Set up App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys ~/.appstoreconnect/private_keys
          P8_PATH=~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          P8_PATH2=~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "$ASC_KEY_CONTENT" | tr -d '\r\n ' | base64 --decode > "$P8_PATH" 2>/dev/null || true
          DECODED_SIZE=$(wc -c < "$P8_PATH")
          DECODED_FIRST=$(head -c 5 "$P8_PATH" 2>/dev/null || echo "")
          echo "decoded size: $DECODED_SIZE first5: $DECODED_FIRST"
          if [ "$DECODED_FIRST" != "-----" ] || [ "$DECODED_SIZE" -lt 100 ]; then
            echo "WARNING: base64 decode invalid — writing raw secret as PEM"
            printf '%s\n' "$ASC_KEY_CONTENT" > "$P8_PATH"
          fi
          cp "$P8_PATH" "$P8_PATH2"
          chmod 600 "$P8_PATH" "$P8_PATH2"
          echo "p8 size: $(wc -c < $P8_PATH) bytes | first line: $(head -1 $P8_PATH)"

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -l build.keychain
          security list-keychains -s build.keychain $(security list-keychains | tr -d '"')

      - name: Write Fastlane API key JSON
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          # Fastlane needs the key field with \n-encoded newlines preserved (not stripped).
          # Use python3 -c to safely JSON-encode the multiline PEM without any heredoc issues.
          python3 -c "
          import json, os
          key_id = os.environ['ASC_KEY_ID']
          issuer_id = os.environ['ASC_ISSUER_ID']
          p8_path = os.path.expanduser(f'~/private_keys/AuthKey_{key_id}.p8')
          key_content = open(p8_path).read().strip()
          payload = {'key_id': key_id, 'issuer_id': issuer_id, 'key': key_content, 'in_house': False}
          open('/tmp/asc_api_key.json', 'w').write(json.dumps(payload))
          print(f'API key JSON written OK, key len={len(key_content)}')
          "

      - name: Fetch Distribution certificate and provisioning profile via Fastlane
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ env.KEYCHAIN_PASSWORD }}
        run: |
          gem list fastlane | grep -q fastlane || gem install fastlane --no-document
          mkdir -p /tmp/certs /tmp/profiles

          # Revoke ALL existing Apple Distribution certificates via ASC API
          # to avoid the 2-cert maximum limit error.
          # Uses Ruby (pre-installed on macos-14) with built-in OpenSSL — no extra gems needed.
          ruby scripts/revoke_dist_certs.rb

          # cert: fetch/create Apple Distribution certificate and import into keychain.
          fastlane cert \
            --api_key_path /tmp/asc_api_key.json \
            --team_id "$APPLE_TEAM_ID" \
            --output_path /tmp/certs \
            --keychain_path ~/Library/Keychains/build.keychain-db \
            --keychain_password "$KEYCHAIN_PASSWORD" \
            --development false \
            --force true 2>&1

          echo "Signing identities after cert:"
          security find-identity -v -p codesigning build.keychain || true

          # sigh: download/create App Store distribution provisioning profile.
          # --force creates a fresh profile linked to the cert we just installed.
          fastlane sigh \
            --api_key_path /tmp/asc_api_key.json \
            --team_id "$APPLE_TEAM_ID" \
            --app_identifier ca.klarityit.spliiit \
            --output_path /tmp/profiles \
            --force true 2>&1
          echo "Profiles fetched:"
          ls -la /tmp/profiles/ 2>/dev/null || echo "(no profiles)"

          # Install profile and extract UUID
          PROFILE=$(find /tmp/profiles -name "*.mobileprovision" | head -1)
          if [ -z "$PROFILE" ]; then
            echo "ERROR: No .mobileprovision found!"
            exit 1
          fi
          # Decode the CMS-signed profile to a temp plist, then extract UUID
          DECODED_PLIST=$(mktemp /tmp/profile_decoded.XXXXXX.plist)
          security cms -D -i "$PROFILE" -o "$DECODED_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$DECODED_PLIST")
          echo "Profile UUID: $PROFILE_UUID"
          echo "=== Profile Entitlements (what sigh gave us) ==="
          /usr/libexec/PlistBuddy -c 'Print Entitlements' "$DECODED_PLIST" || echo "(no Entitlements key in profile)"
          echo "=== App.entitlements file we copied ==="
          cat ios/App/App/App.entitlements || echo "(file not found)"
          rm -f "$DECODED_PLIST"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE" ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Profile installed."

      - name: Set Xcode signing for distribution
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          sed -i '' "s/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g" \
            App.xcodeproj/project.pbxproj 2>/dev/null || true
          sed -i '' 's/CODE_SIGN_STYLE = "Automatic"/CODE_SIGN_STYLE = Manual/g' \
            App.xcodeproj/project.pbxproj 2>/dev/null || true
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = ${APPLE_TEAM_ID};/g" \
            App.xcodeproj/project.pbxproj 2>/dev/null || true
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = \"${PROFILE_UUID}\";/g" \
            App.xcodeproj/project.pbxproj 2>/dev/null || true
          echo "Signing settings:"
          grep -E "CODE_SIGN_STYLE|DEVELOPMENT_TEAM|CODE_SIGN_IDENTITY|PROVISIONING_PROFILE" \
            App.xcodeproj/project.pbxproj | head -20

      - name: Build archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          set -o pipefail
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath $HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID \
            OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/build.keychain-db" \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            MARKETING_VERSION=1.2.3 \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            CODE_SIGN_ENTITLEMENTS="App/App.entitlements" 2>&1 | tee /tmp/xcodebuild-archive.log | tail -80
          echo "--- Archive exit code: $? ---"
          ls -la $RUNNER_TEMP/App.xcarchive/ 2>/dev/null || echo "Archive not created!"

      - name: Inject PrivacyInfo.xcprivacy into archive frameworks (ITMS-91061)
        run: |
          # GTMAppAuth + GTMSessionFetcher are source pods — compiled into DerivedData by Xcode,
          # not pre-built in Pods/. GoogleSignIn 6.x is binary but same approach works for all.
          # Inject AFTER archive (frameworks are fully built) but BEFORE export (which re-signs,
          # so the new file gets a valid signature in the final IPA).
          FW_DIR="$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app/Frameworks"
          echo "=== Frameworks in archive ==="
          ls "$FW_DIR" 2>/dev/null || echo "WARNING: Frameworks dir not found at $FW_DIR"
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '  <key>NSPrivacyTracking</key><false/>' \
            '  <key>NSPrivacyTrackingDomains</key><array/>' \
            '  <key>NSPrivacyCollectedDataTypes</key><array/>' \
            '  <key>NSPrivacyAccessedAPITypes</key>' \
            '  <array><dict>' \
            '    <key>NSPrivacyAccessedAPIType</key><string>NSPrivacyAccessedAPICategoryUserDefaults</string>' \
            '    <key>NSPrivacyAccessedAPITypeReasons</key><array><string>CA92.1</string></array>' \
            '  </dict></array>' \
            '</dict></plist>' \
            > /tmp/PrivacyInfo.xcprivacy
          for SDK in GoogleSignIn GTMAppAuth GTMSessionFetcher; do
            FW="$FW_DIR/${SDK}.framework"
            if [ -d "$FW" ]; then
              cp /tmp/PrivacyInfo.xcprivacy "$FW/PrivacyInfo.xcprivacy"
              echo "Injected → $FW/PrivacyInfo.xcprivacy"
            else
              echo "WARNING: $FW not found in archive"
            fi
          done
          echo "=== Done ==="

      - name: Verify entitlements in archive
        run: |
          APP_PATH="$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app"
          echo "=== Entitlements in signed binary ==="
          codesign -d --entitlements :- "$APP_PATH" 2>/dev/null || \
            codesign -d --entitlements - "$APP_PATH" 2>/dev/null || true
          echo "=== Checking for Sign in with Apple entitlement ==="
          if codesign -d --entitlements :- "$APP_PATH" 2>/dev/null | grep -q "applesignin"; then
            echo "✅ com.apple.developer.applesignin entitlement is present"
          else
            echo "❌ ERROR: Sign in with Apple entitlement NOT found in signed binary!"
            echo "   Fix: Enable 'Sign in with Apple' in Apple Developer Portal for App ID ca.klarityit.spliiit"
            exit 1
          fi
          echo "=== Checking for APNs (Push Notifications) entitlement ==="
          if codesign -d --entitlements :- "$APP_PATH" 2>/dev/null | grep -q "aps-environment"; then
            echo "✅ aps-environment entitlement is present"
          else
            echo "❌ ERROR: aps-environment entitlement NOT found in signed binary!"
            echo "   Fix: Enable 'Push Notifications' in Apple Developer Portal for App ID ca.klarityit.spliiit"
            exit 1
          fi

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Write ExportOptions.plist using printf to avoid heredoc YAML issues
          printf '<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>%s</string>
            <key>provisioningProfiles</key><dict>
              <key>ca.klarityit.spliiit</key><string>%s</string>
            </dict>
          </dict></plist>\n' "$APPLE_TEAM_ID" "$PROFILE_UUID" > $RUNNER_TEMP/ExportOptions.plist

          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath $HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID 2>&1 | tail -50
          echo "Export contents:"
          find $RUNNER_TEMP/export -type f 2>/dev/null || echo "Export dir empty!"

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          echo "IPA path: $IPA_PATH"
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No .ipa file found in export directory"
            ls -la $RUNNER_TEMP/export/ || true
            exit 1
          fi
          # Use xcrun altool --upload-app (works with API key, no --apple-id needed)
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
