# ============================================================
# iOS Build & App Store Upload — Spliiit
# ============================================================
# Builds the Capacitor iOS app and uploads to TestFlight.
# Uses Xcode automatic signing — no Match or Cloud Mac needed.
#
# REQUIRED GITHUB SECRETS:
#   ASC_KEY_ID          — App Store Connect API Key ID
#   ASC_ISSUER_ID       — App Store Connect Issuer ID
#   ASC_KEY_CONTENT     — Base64-encoded .p8 API key file
#   APPLE_TEAM_ID       — Apple Developer Team ID (e.g. 7JUGQ64AX4)
#
# MANUAL TRIGGER:
#   Actions tab > "iOS Build & TestFlight" > "Run workflow"
# ============================================================

name: iOS Build & TestFlight

on:
  workflow_dispatch:
    inputs:
      submit_to_review:
        description: "Submit to App Store review after TestFlight upload?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    name: Build iOS & Upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Install Capacitor (pinned to v7)
        run: |
          npm install @capacitor/core@7 @capacitor/ios@7 @capacitor/cli@7

      - name: Add iOS platform (allow pod install to fail — we fix it next)
        run: |
          rm -rf ios
          # cap add ios creates the template + Podfile even if pod install fails
          # because the default Podfile targets iOS 13 but Capacitor pods need 16+
          npx cap add ios || true

      - name: Fix deployment target and install pods
        run: |
          cd ios/App

          # Fix Podfile: bump platform to 16.0
          sed -i '' "s/platform :ios, '.*'/platform :ios, '16.0'/" Podfile

          # Fix Xcode project: bump all deployment target entries
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/g" App.xcodeproj/project.pbxproj

          # Now pod install will succeed
          pod install

          cd ../..

          # Copy web assets into the iOS project
          npx cap copy ios

      - name: Copy app icons and Info.plist
        run: |
          cp -r ios-assets/Assets.xcassets/AppIcon.appiconset/* \
            ios/App/App/Assets.xcassets/AppIcon.appiconset/
          cp ios-assets/Info.plist ios/App/App/Info.plist

      - name: Set up App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          mkdir -p ~/private_keys
          P8_PATH=~/private_keys/AuthKey_${ASC_KEY_ID}.p8
          # The secret may be stored in one of these formats:
          #   (a) base64-encoded blob (decoded result is the PEM)
          #   (b) literal PEM with real newlines
          #   (c) literal PEM with escaped \n sequences (single-line)
          # Strategy: check first 5 non-whitespace chars.
          #   If "-----" → PEM format (b or c): use printf %b to expand \n escapes
          #   Otherwise  → base64 (a): strip whitespace and decode
          TRIMMED=$(echo "$ASC_KEY_CONTENT" | tr -d '\r\n ' | cut -c1-5)
          if [ "$TRIMMED" = "-----" ]; then
            # PEM text — printf %b expands literal \n sequences into real newlines
            printf '%b' "$ASC_KEY_CONTENT" | tr -d '\r' > "$P8_PATH"
          else
            # Base64-encoded — strip all whitespace then decode
            echo "$ASC_KEY_CONTENT" | tr -d '\r\n ' | base64 --decode > "$P8_PATH"
          fi
          chmod 600 "$P8_PATH"
          echo "p8 first line: $(head -1 $P8_PATH)"
          echo "p8 line count: $(wc -l < $P8_PATH)"
          echo "p8 file size:  $(wc -c < $P8_PATH) bytes"

      - name: Set Xcode automatic signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          sed -i '' \
            "s/CODE_SIGN_STYLE = Manual/CODE_SIGN_STYLE = Automatic/g" \
            App.xcodeproj/project.pbxproj 2>/dev/null || true
          sed -i '' \
            "s/PROVISIONING_PROFILE_SPECIFIER = .*/PROVISIONING_PROFILE_SPECIFIER = \"\";/g" \
            App.xcodeproj/project.pbxproj 2>/dev/null || true

      - name: Build archive
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd ios/App
          BUILD_NUMBER=$(date +%Y%m%d%H%M)

          set -o pipefail
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID \
            CURRENT_PROJECT_VERSION=$BUILD_NUMBER \
            MARKETING_VERSION=1.0.0 \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID \
            | xcpretty

      - name: Export IPA
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # teamID must be expanded — use unquoted heredoc delimiter
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>destination</key>
              <string>upload</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          PLIST

          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${ASC_KEY_ID}.p8 \
            -authenticationKeyID $ASC_KEY_ID \
            -authenticationKeyIssuerID $ASC_ISSUER_ID \
            | xcpretty

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-package \
            "$RUNNER_TEMP/export/App.ipa" \
            --type ios \
            --bundle-id ca.klarityit.spliiit \
            --bundle-version $(date +%Y%m%d%H%M) \
            --bundle-short-version-string 1.0.0 \
            --apiKey $ASC_KEY_ID \
            --apiIssuer $ASC_ISSUER_ID
