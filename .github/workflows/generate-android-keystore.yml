name: 🔑 Generate Android Keystore (ONE-TIME SETUP)

# ─────────────────────────────────────────────────────────────────────────────
# Run this workflow ONCE to generate your Android signing keystore.
# After running, copy the output from the "Summary" tab and save it as
# GitHub Secrets. NEVER run this again — the same keystore must be used
# for all future releases or Google Play will reject your updates.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias — use: spliiit'
        required: true
        default: 'spliiit'
      keystore_password:
        description: 'Keystore password (16+ chars, save it safely!)'
        required: true
      key_password:
        description: 'Key password (16+ chars, save it safely!)'
        required: true

jobs:
  generate-keystore:
    name: Generate keystore & output secrets
    runs-on: ubuntu-latest

    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Android release keystore
        run: |
          keytool -genkeypair \
            -alias "${{ inputs.key_alias }}" \
            -keypass "${{ inputs.key_password }}" \
            -keystore spliiit-release.keystore \
            -storepass "${{ inputs.keystore_password }}" \
            -dname "CN=Spliiit, OU=Mobile, O=KlarityIT, L=Toronto, ST=ON, C=CA" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS

      - name: Write secrets to Job Summary
        run: |
          KEYSTORE_B64=$(base64 -w 0 spliiit-release.keystore)

          echo "## ✅ Android Keystore Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Save these values as GitHub Secrets NOW — you cannot retrieve them again.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Go to: **GitHub → Your repo → Settings → Secrets → Actions → New repository secret**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Secret 1 — \`ANDROID_KEYSTORE_BASE64\`" >> $GITHUB_STEP_SUMMARY
          echo "Copy the entire string below (no spaces):" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$KEYSTORE_B64" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Secret 2 — \`ANDROID_KEYSTORE_PASSWORD\`" >> $GITHUB_STEP_SUMMARY
          echo "Value: the **Keystore password** you entered above" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Secret 3 — \`ANDROID_KEY_ALIAS\`" >> $GITHUB_STEP_SUMMARY
          echo "Value: \`${{ inputs.key_alias }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Secret 4 — \`ANDROID_KEY_PASSWORD\`" >> $GITHUB_STEP_SUMMARY
          echo "Value: the **Key password** you entered above" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "Once all 4 secrets are saved, run the **Android Build & Release** workflow." >> $GITHUB_STEP_SUMMARY
