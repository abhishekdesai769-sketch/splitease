name: 🤖 Android Build & Release

# ─────────────────────────────────────────────────────────────────────────────
# Builds a signed Android App Bundle (AAB) using Capacitor.
# The AAB is uploaded as a GitHub artifact — download it and upload to
# Google Play Console → Testing → Internal testing to replace the TWA build.
#
# Required GitHub Secrets:
#   ANDROID_KEYSTORE_BASE64      — base64-encoded .keystore file
#   ANDROID_KEYSTORE_PASSWORD    — keystore password
#   ANDROID_KEY_ALIAS            — key alias (e.g. spliiit)
#   ANDROID_KEY_PASSWORD         — key password
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'App version name shown to users (e.g. 1.0.1)'
        required: false
        default: '1.0'

jobs:
  build:
    name: Build signed AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # Install Capacitor packages (not in package.json, installed here only)
      - name: Install Capacitor packages
        run: |
          npm install --no-save \
            @capacitor/cli@^6.0.0 \
            @capacitor/core@^6.0.0 \
            @capacitor/android@^6.0.0 \
            @capacitor/splash-screen@^6.0.0 \
            @capacitor/status-bar@^6.0.0

      # ── 3. Build web app (client only — Capacitor just needs dist/public/) ──
      - name: Build web app
        run: npx vite build

      # ── 4. Capacitor: add Android platform and sync web assets ───────────────
      - name: Add Android Capacitor platform
        run: npx cap add android

      - name: Sync web assets to Android project
        run: npx cap sync android

      # ── 5. Java & Android SDK ────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 6. Signing setup ─────────────────────────────────────────────────────
      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Inject signing config into build.gradle
        run: python3 scripts/patch_android_signing.py

      # ── 7. Version code & name ───────────────────────────────────────────────
      - name: Set version code and name
        run: |
          # versionCode must increase with each Play Store upload — use run number
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          # versionName is the human-readable version shown on Play Store
          sed -i 's/versionName "1.0"/versionName "${{ inputs.version_name }}"/' android/app/build.gradle
          echo "Version: ${{ inputs.version_name }} (code ${{ github.run_number }})"

      # ── 8. Build ─────────────────────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      # ── 9. Upload artifact ───────────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: spliiit-${{ inputs.version_name }}-build${{ github.run_number }}.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── 10. Summary ──────────────────────────────────────────────────────────
      - name: Write build summary
        run: |
          echo "## ✅ Android Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version name | \`${{ inputs.version_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version code | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundle ID | \`ca.klarityit.spliiit\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next steps" >> $GITHUB_STEP_SUMMARY
          echo "1. **Download** the \`.aab\` file from the Artifacts section above" >> $GITHUB_STEP_SUMMARY
          echo "2. Go to [Google Play Console](https://play.google.com/console) → Spliiit → Testing → Internal testing" >> $GITHUB_STEP_SUMMARY
          echo "3. Click **Create new release** → Upload the \`.aab\` file" >> $GITHUB_STEP_SUMMARY
          echo "4. Save and roll out to testers" >> $GITHUB_STEP_SUMMARY
          echo "5. Testers reinstall or update the app — engagement now tracks to YOUR app" >> $GITHUB_STEP_SUMMARY
